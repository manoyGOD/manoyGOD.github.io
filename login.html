<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="login-style.css">
</head>

<body>
<header>
	<h2 class="logo"><img src="logo-icon.jpeg" alt="ThyRoots Logo"></h2>
	<nav class="navigation">
		<button class="btnLogin-popup">Login</button>
	</nav>
</header>

<div class="wrapper">
	<span class="icon-close"><ion-icon name="close"></ion-icon></span>

	<div class="form-box login">
		<h2>Login</h2>
		<form id="loginForm" action="#">
			<div class="input-box">
				<span class="icon"><ion-icon name="mail"></ion-icon></span>
				<input id="email" type="email" required>
				<label>Email</label>
			</div>
			<div class="input-box">
				<span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
				<input id="password" type="password" required>
				<label>Password</label>
			</div>
			<div class="remember-forgot">
				<label><input type="checkbox">Remember me</label>
				<a href="#">Forgot password?</a>
			</div>
			<button type="submit" class="btn">Login</button>
			<div class="login-register">
				<p>Don't have an account? <a href="#" class="register-link">Register</a></p>
				<p><a href="index.html">Continue as guest?</a></p>
			</div>
		</form>
	</div>

	<div class="form-box register">
		<h2>Registration</h2>
		<form id="registerForm" action="#">
			<div class="input-box">
				<span class="icon"><ion-icon name="person"></ion-icon></span>
				<input id="registerEmail" type="email" required>
				<label>Email</label>
			</div>
			<div class="input-box">
				<span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
				<input id="registerPassword" type="password" required>
				<label>Password</label>
			</div>
			<div class="remember-forgot">
				<label><input type="checkbox">I agree to the terms & conditions</label>
			</div>
			<button type="submit" class="btn">Register</button>
			<div class="login-register">
				<p>Already have an account? <a href="#" class="login-link">Login</a></p>
			</div>
		</form>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js" type="module"></script>
<script src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js" nomodule></script>
<script src="script.js"></script>
</body>

</html>
